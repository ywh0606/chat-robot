<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Chat Robot</title>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        :root {
            --primary-gradient: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            --primary-color: #667eea;
            --primary-dark: #5a67d8;
            --secondary-color: #764ba2;
            --bg-color: #f0f2f5;
            --surface-color: #ffffff;
            --text-primary: #1a1a2e;
            --text-secondary: #64748b;
            --border-color: #e2e8f0;
            --shadow-sm: 0 1px 2px rgba(0, 0, 0, 0.05);
            --shadow-md: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -2px rgba(0, 0, 0, 0.1);
            --shadow-lg: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -4px rgba(0, 0, 0, 0.1);
            --radius-sm: 8px;
            --radius-md: 12px;
            --radius-lg: 16px;
            --radius-xl: 20px;
        }
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: var(--bg-color);
            color: var(--text-primary);
            height: 100vh;
            display: flex;
            flex-direction: column;
            line-height: 1.6;
            letter-spacing: 0.01em;
        }
        .header {
            background: var(--primary-gradient);
            color: white;
            padding: 18px 24px;
            text-align: center;
            font-size: 20px;
            font-weight: 700;
            box-shadow: var(--shadow-md);
            position: relative;
            z-index: 10;
            letter-spacing: 0.05em;
        }
        .chat-container {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }
        .message {
            max-width: 70%;
            padding: 14px 20px;
            border-radius: var(--radius-lg);
            line-height: 1.6;
            word-wrap: break-word;
        }
        .user-message {
            align-self: flex-end;
            background: var(--primary-gradient);
            color: white;
            border-bottom-right-radius: var(--radius-sm);
            box-shadow: 0 2px 8px rgba(102, 126, 234, 0.3);
        }
        .ai-message {
            align-self: flex-start;
            background: var(--surface-color);
            color: var(--text-primary);
            border: 1px solid var(--border-color);
            border-bottom-left-radius: var(--radius-sm);
            box-shadow: var(--shadow-sm);
        }
        .input-area {
            padding: 16px;
            background: white;
            border-top: 1px solid #e8e8e8;
            display: flex;
            gap: 12px;
        }
        #messageInput {
            flex: 1;
            padding: 12px;
            border: 1px solid #d9d9d9;
            border-radius: 4px;
            font-size: 14px;
            resize: none;
        }
        #messageInput:focus {
            outline: none;
            border-color: #1890ff;
        }
        #sendBtn {
            padding: 12px 24px;
            background: #1890ff;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 14px;
        }
        #sendBtn:hover {
            background: #40a9ff;
        }
        #sendBtn:disabled {
            background: #d9d9d9;
            cursor: not-allowed;
        }
        .loading {
            color: #999;
            font-style: italic;
        }
        .search-info {
            font-size: 12px;
            color: #1890ff;
            margin-top: 4px;
        }
        .ai-message h1, .ai-message h2, .ai-message h3 {
            margin: 12px 0 8px;
            line-height: 1.4;
        }
        .ai-message h1 { font-size: 18px; }
        .ai-message h2 { font-size: 16px; }
        .ai-message h3 { font-size: 15px; }
        .ai-message p { margin: 6px 0; }
        .ai-message ul, .ai-message ol {
            margin: 6px 0;
            padding-left: 20px;
        }
        .ai-message li { margin: 4px 0; }
        .ai-message code {
            background: #f0f0f0;
            padding: 2px 5px;
            border-radius: 3px;
            font-size: 13px;
        }
        .ai-message pre {
            background: #f5f5f5;
            padding: 12px;
            border-radius: 4px;
            overflow-x: auto;
            margin: 8px 0;
        }
        .ai-message pre code {
            background: none;
            padding: 0;
        }
        .ai-message blockquote {
            border-left: 3px solid #1890ff;
            padding-left: 12px;
            margin: 8px 0;
            color: #666;
        }
        .ai-message strong { font-weight: 600; }
        .ai-message hr {
            border: none;
            border-top: 1px solid #e8e8e8;
            margin: 12px 0;
        }
        .ai-message table {
            border-collapse: collapse;
            margin: 8px 0;
            width: 100%;
        }
        .ai-message th, .ai-message td {
            border: 1px solid #d9d9d9;
            padding: 6px 10px;
            text-align: left;
        }
        .ai-message th { background: #fafafa; }
    </style>
</head>
<body>
    <div class="header">AI Chat Robot</div>
    <div class="chat-container" id="chatContainer">
        <div class="message ai-message">
            你好！我是AI聊天机器人。我可以帮助你聊天和搜索信息。有什么可以帮你的吗？
        </div>
    </div>
    <div class="input-area">
        <textarea id="messageInput" rows="1" placeholder="输入消息..."></textarea>
        <button id="sendBtn">发送</button>
    </div>

    <script>
        const chatContainer = document.getElementById('chatContainer');
        const messageInput = document.getElementById('messageInput');
        const sendBtn = document.getElementById('sendBtn');

        let isLoading = false;

        function addMessage(content, isUser = false) {
            const div = document.createElement('div');
            div.className = `message ${isUser ? 'user-message' : 'ai-message'}`;
            if (isUser) {
                div.textContent = content;
            } else {
                div.innerHTML = marked.parse(content);
            }
            chatContainer.appendChild(div);
            chatContainer.scrollTop = chatContainer.scrollHeight;
        }

        function setLoading(loading) {
            isLoading = loading;
            sendBtn.disabled = loading;
            sendBtn.textContent = loading ? '发送中...' : '发送';
        }

        async function sendMessage() {
            const message = messageInput.value.trim();
            if (!message || isLoading) return;

            addMessage(message, true);
            messageInput.value = '';
            setLoading(true);

            const loadingDiv = document.createElement('div');
            loadingDiv.className = 'message ai-message loading';
            loadingDiv.textContent = '思考中...';
            chatContainer.appendChild(loadingDiv);

            try {
                // 使用非流式接口（更稳定，支持搜索功能）
                const response = await fetch('/api/chat', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({
                        message: message
                    })
                });

                loadingDiv.remove();

                if (!response.ok) {
                    addMessage(`请求失败（HTTP ${response.status}），请检查后端服务是否正常运行。`);
                    return;
                }

                const result = await response.json();
                const content = result.response || '';

                if (content.trim()) {
                    const aiDiv = document.createElement('div');
                    aiDiv.className = 'message ai-message';
                    aiDiv.innerHTML = marked.parse(content);
                    chatContainer.appendChild(aiDiv);
                    chatContainer.scrollTop = chatContainer.scrollHeight;
                } else {
                    addMessage('AI 未返回有效内容，请重试。');
                }
            } catch (error) {
                loadingDiv.remove();
                addMessage(`网络连接失败：${error.message || '请检查后端服务是否启动'}`);
            } finally {
                setLoading(false);
            }
        }

        sendBtn.addEventListener('click', sendMessage);
        messageInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        });
    </script>
</body>
</html>
